version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    image: pos-system-dev:latest
    container_name: pos-dev
    volumes:
      - ..:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: pos_db
      POSTGRES_USER: pos_user
      POSTGRES_PASSWORD: pos_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: pos_password
      KAFKA_BROKERS: kafka:29092
      MINIO_HOST: minio
      MINIO_PORT: 9000
    networks:
      - pos-dev-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_started
      vault:
        condition: service_started
    ports:
      - "3000:3000"
      - "8080:8080"
      - "8081:8081"
      - "8082:8082"
      - "8083:8083"
      - "8084:8084"
      - "8085:8085"
      - "8086:8086"
      - "8087:8087"
      - "5555:5555"
    tty: true
    stdin_open: true
    command: /bin/bash

  postgres:
    image: postgres:14.19-alpine3.21
    container_name: pos-dev-postgres
    environment:
      POSTGRES_DB: pos_db
      POSTGRES_USER: pos_user
      POSTGRES_PASSWORD: pos_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pos_user -d pos_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pos-dev-network
    deploy:
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 512M

  redis:
    image: redis:8.0.5-alpine
    container_name: pos-dev-redis
    command: redis-server --requirepass pos_password --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pos-dev-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: pos-dev-kafka
    ports:
      - "9092:9092"
      - "29092:29092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: 'PLAINTEXT://:29092,PLAINTEXT_HOST://:9092,CONTROLLER://:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: '4Yd5GOPATfi2bVBEGVfGpw'
    volumes:
      - kafka_data_dev:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - pos-dev-network
    deploy:
      resources:
        limits:
          memory: 2048M
        reservations:
          memory: 1024M

  minio:
    image: minio/minio:latest
    container_name: pos-dev-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data_dev:/data
    networks:
      - pos-dev-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  mailhog:
    image: mailhog/mailhog:latest
    container_name: pos-dev-mailhog
    ports:
      - "1025:1025"
      - "5555:8025"
    networks:
      - pos-dev-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  vault:
    image: hashicorp/vault:1.15
    container_name: pos-dev-vault
    entrypoint: ["/vault/scripts/vault-entrypoint.sh"]
    environment:
      VAULT_ENV: development
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    volumes:
      - vault_data_dev:/vault/data
      - ../vault/vault-config-raft-storage.hcl:/vault/config/vault-config.hcl:ro
      - ../vault/vault-init.sh:/vault/scripts/vault-init.sh:ro
      - ../vault/vault-entrypoint.sh:/vault/scripts/vault-entrypoint.sh:ro
      - ../vault/tls:/vault/tls:ro
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "VAULT_ADDR=https://vault:8200 VAULT_CACERT=/vault/tls/ca.crt vault status"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - pos-dev-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

networks:
  pos-dev-network:
    driver: bridge

volumes:
  postgres_data_dev:
  redis_data_dev:
  kafka_data_dev:
  minio_data_dev:
  vault_data_dev:
